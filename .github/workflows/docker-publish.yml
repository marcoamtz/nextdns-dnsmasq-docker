name: Build and Publish Docker Image

on:
  push:
    branches:
      - main

# The version is derived from the commit (git commit count), so it is already
# race-proof: overlapping pushes have distinct commits and therefore distinct
# versions. This block only serializes runs so the ':latest' tag ends up
# pointing at the newest commit rather than whichever merge finishes last. Do
# NOT cancel in progress: each push to main is meant to publish its own image.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: marcoamtz/nextdns-dnsmasq

jobs:
  # Compute the release version exactly once and share it with every other job.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute version from commit count
        id: version
        run: |
          # Derive the version from the commit itself rather than from the
          # latest remote tag. This is deterministic per commit and therefore
          # race-proof: overlapping pushes have distinct commits, so they
          # cannot compute the same version. MAJOR.MINOR are fixed; PATCH is
          # the first-parent commit count, which only ever increases.
          PATCH=$(git rev-list --count --first-parent HEAD)
          NEW_VERSION="0.0.${PATCH}"
          echo "New version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"

  # Build each architecture natively (no QEMU emulation) and push by digest.
  build:
    needs: prepare
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the multi-arch manifest, tag the git release, and publish docs once.
  merge:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:${VERSION}" \
            -t "${IMAGE_NAME}:latest" \
            $(printf "${IMAGE_NAME}@sha256:%s " *)
          docker buildx imagetools inspect "${IMAGE_NAME}:${VERSION}"

      - name: Create and push tag
        env:
          TAG: ${{ needs.prepare.outputs.version }}
        run: |
          # Idempotent: a manual re-run of the same commit recomputes the same
          # version, so skip tagging if the tag already exists remotely.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Update Docker Hub description
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./DOCKERHUB.md
          short-description: "NextDNS with DNSMasq proxy - DNS filtering, privacy, and optional DHCP"
